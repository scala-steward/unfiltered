name: ci
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: 25
            os: ubuntu-latest
          - java: 17
            os: ubuntu-latest
          - java: 17
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/setup-java@v5
      with:
        java-version: ${{matrix.java}}
        distribution: zulu
    - uses: actions/checkout@v7
    - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
    - if: matrix.os != 'windows-latest'
      run: sbt -v --server scalafmtSbtCheck "+ scalafmtCheckAll"
    - shell: bash
      run: sbt -v --server "+ testFull" "+ publishLocal"
    - shell: bash
      run: rm -rf "$HOME/.ivy2/local" || true
